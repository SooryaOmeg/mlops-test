name: MLOps Pipeline - Test & Deploy

# 1. This triggers the pipeline whenever you push to the 'main' branch
on:
  push:
    branches: [ "main" ]

jobs:
  # ---------------------------------------------
  # Continuous Integration (CI) - Testing Phase
  # ---------------------------------------------
  test-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run API tests
        run: |
          pytest tests/test_pipeline.py

  # ---------------------------------------------
  # Continuous Deployment (CD) - Deployment Phase
  # ---------------------------------------------
  deploy-to-hub:
    # This ensures deployment ONLY happens if the tests above pass!
    needs: test-pipeline
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Push to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Add the Hugging Face remote repository
          git remote add space https://huggingface.co/spaces/SooryaOmeg/mlops-test
          
          # Force push the main branch to Hugging Face to trigger the Streamlit build
          git push --force https://YOUR_HF_USERNAME:$HF_TOKEN@huggingface.co/spaces/SooryaOmeg/mlops-test main
