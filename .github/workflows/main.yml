name: MLOps Pipeline - Test & Deploy

# 1. This triggers the pipeline whenever you push to the 'main' branch
on:
  push:
    branches: [ "main" ]

jobs:
  # ---------------------------------------------
  # Continuous Integration (CI) - Testing Phase
  # ---------------------------------------------
  test-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run API tests
        run: |
          pytest tests/test_pipeline.py

  # ---------------------------------------------
  # Continuous Deployment (CD) - Deployment Phase
  # ---------------------------------------------
  deploy-to-hub:
    needs: test-pipeline
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Hugging Face CLI
        # Installs the modern standalone 'hf' binary natively into the runner
        run: curl -LsSf https://hf.co/cli/install.sh | bash

      - name: Deploy to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # The 'hf' CLI natively handles large binary files
          hf upload SooryaOmeg/mlops-test . . --repo-type space
